<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lust Wallet</title>
    <meta name="robots" content="noindex" />
    <style>
      html,body{margin:0;height:100%;background:#0b0f17;color:#fff;font-family:Inter,system-ui,Arial,sans-serif}
      .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
      .card{width:min(460px,100%);border-radius:28px;border:1px solid rgba(215,46,126,.22);background:linear-gradient(180deg,#0f1728 0%,#0b1120 100%);box-shadow:0 28px 80px rgba(0,0,0,.55);padding:24px;display:grid;gap:14px}
      .badge{display:inline-flex;width:fit-content;padding:7px 11px;border-radius:999px;border:1px solid rgba(215,46,126,.24);background:rgba(215,46,126,.12);color:rgb(215,46,126);font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
      .hint{color:#94a3b8;line-height:1.6}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <span class="badge">Lust Wallet</span>
        <div style="font-size:30px;line-height:1.04;font-weight:900;letter-spacing:-.03em">Opening WalletConnect</div>
        <div class="hint">Loading the wallet and preparing the connection request.</div>
      </div>
    </div>
    <script>
      (function () {
        var url = new URL(window.location.href);
        var next = new URL(window.location.origin + '/');
        next.searchParams.set('wc_route', '1');
        ['uri', 'requestId', 'sessionTopic', 'returnUrl'].forEach(function (key) {
          var value = url.searchParams.get(key);
          if (value) next.searchParams.set(key, value);
        });
        window.location.replace(next.toString());
      })();
    </script>
  </body>
</html>
